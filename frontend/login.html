<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link
    rel="icon"
    type="image/png"
    href="./logo.png"
>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link
        rel="stylesheet"
        href="./css/style.css"
    >

</head>

<body class="home-body">

    <div class="overlay"></div>

    <main class="hero">

        <div class="hero-content">

            <img
                src="./logo.png"
                class="hero-logo"
                alt="Logo"
            >

            <span class="tag">

                Acesso Seguro

            </span>

            <h1>

                Login

            </h1>

            <p class="descricao">

                Entre na plataforma para gerenciar
                seus agendamentos.

            </p>

            <input
                type="text"
                id="username"
                placeholder="Usuário"
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
            >

            <button
                class="primary-btn"
                onclick="login()"
            >

                Entrar

            </button>

            <p id="mensagem"></p>

            <a
                href="cadastro.html"
                class="link-login"
            >

                Não possui conta? Criar conta

            </a>

        </div>

    </main>

    <script src="./js/login.js"></script>

</body>

</html>
