<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link
    rel="icon"
    type="image/png"
    href="./logo.png"
>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Cadastro</title>

    <link
        rel="stylesheet"
        href="./css/style.css"
    >

</head>
<link
    rel="icon"
    type="image/png"
    href="./logo.png"
>

<body class="home-body">

    <div class="overlay"></div>

    <main class="hero">

        <div class="hero-content">

            <div class="topo-logo">

                <img
                    src="./logo.png"
                    class="hero-logo"
                    alt="Logo"
                >

                <span class="tag">

                    Novo Usuário

                </span>

            </div>

            <h1>

                Criar Conta

            </h1>

            <p class="descricao">

                Cadastre-se para acessar o sistema
                premium de agendamentos.

            </p>

            <input
                type="text"
                id="username"
                placeholder="Usuário"
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
            >

            <button
                class="primary-btn"
                onclick="cadastrar()"
            >

                Criar Conta

            </button>

            <p id="mensagem"></p>

            <a
                href="login.html"
                class="link-login"
            >

                Já possui conta? Entrar

            </a>

        </div>

    </main>

    <script src="./js/cadastro.js"></script>

</body>

</html>
